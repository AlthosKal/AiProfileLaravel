services:
    # 7. Base de datos PostgreSQL para Laravel
  laravel-api-db-postgresql:
    image: pgvector/pgvector:pg17
    container_name: laravel-api-db-postgresql
    ports:
      - "5432:5432"
    env_file:
      - .env.docker.api.postgresql
    volumes:
      - laravel_api_postgresql_data:/var/lib/postgresql/data
    networks:
      - laravel_api_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel-api-user -d laravel-api-db"]
      interval: 10s
      timeout: 5s
      retries: 5  
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    # 7. Base de datos PostgreSQL para Laravel
  laravel-mcp-db-postgresql:
    image: pgvector/pgvector:pg17
    container_name: laravel-mcp-db-postgresql
    ports:
      - "5433:5432"
    env_file:
      - .env.docker.mcp.postgresql
    volumes:
      - laravel_mcp_postgresql_data:/var/lib/postgresql/data
    networks:
      - laravel_api_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel-mcp-user -d laravel-mcp-db"]
      interval: 10s
      timeout: 5s
      retries: 5  
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # 8. Base de datos Redis para Laravel (caché, colas, sesiones)
  laravel-api-db-redis:
    image: redis:7-alpine
    container_name: laravel-api-db-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --databases 16
      --maxclients 10000
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --latency-monitor-threshold 100
    volumes:
      - laravel_api_redis_data:/data
    networks:
      - laravel_api_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 5G
        reservations:
          cpus: '0.5'
          memory: 1G

  # 8. Base de datos Redis para Laravel (caché, colas, sesiones)
  laravel-mcp-db-redis:
    image: redis:7-alpine
    container_name: laravel-mcp-db-redis
    ports:
      - "6380:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --databases 16
      --maxclients 10000
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --latency-monitor-threshold 100
    volumes:
      - laravel_mcp_redis_data:/data
    networks:
      - laravel_api_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 5G
        reservations:
          cpus: '0.5'
          memory: 1G

  # 9. Kafka KRaft (broker de mensajes entre laravel-api y laravel-mcp)
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka-broker
    ports:
      - "9092:9092"
    env_file:
      - .env.docker.kafka
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - laravel_api_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # 10. Kafka UI (panel de administración, solo desarrollo)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - laravel_api_network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  #9. MinIO - S3 Compatible Object Storage para Laravel, especificamente almacenando archivos (PDFs, documentos, etc.)
  laravel-mcp-minio:
    image: quay.io/minio/minio:latest
    container_name: laravel-mcp-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env.docker.minio
    ports:
      - "9002:9000"      # API S3 (mapeado a 9002 porque Portainer usa 9000)
      - "9003:9001"      # Consola Web UI (mapeado a 9003)
    volumes:
      - laravel_api_minio_data:/data
    networks:
      - laravel_api_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  #10. MinIO Client - Inicialización automática de buckets
  laravel-mcp-minio-init:
    image: quay.io/minio/mc:latest
    container_name: laravel-mcp-minio-init
    depends_on:
      laravel-mcp-minio:
        condition: service_healthy
    networks:
      - laravel_api_network
    env_file:
      - .env.docker.minio
    entrypoint: >
      /bin/sh -c "
      echo 'Esperando a que MinIO esté listo...';
      sleep 10;
      echo 'Configurando alias de MinIO...';
      /usr/bin/mc alias set myminio http://sigest-legal-minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      echo 'Creando bucket laravel-bucket...';
      /usr/bin/mc mb myminio/laravel-bucket --ignore-existing;
      echo 'Configurando política de acceso...';
      /usr/bin/mc anonymous set download myminio/laravel-bucket;
      echo 'MinIO configurado correctamente';
      exit 0;
      "

  # 11. Python Sandbox — ejecución aislada de scripts generados por la IA
  mcp-sandbox-python:
    build:
      context: ./docker/sandbox-python
      dockerfile: Dockerfile
    image: mcp-sandbox-python:latest
    container_name: mcp-sandbox-python
    # Sin red: el sandbox no puede hacer llamadas salientes
    network_mode: none
    # Sin acceso al filesystem del host salvo el volumen de jobs
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - mcp_sandbox_jobs:/sandbox/jobs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # El contenedor permanece activo; los jobs se lanzan con docker exec
    command: sleep infinity
    restart: unless-stopped

networks:
  laravel_api_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
    driver_opts:
      com.docker.network.bridge.name: br-laravel-api
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: 1500

volumes:
  mcp_sandbox_jobs:
  laravel_api_redis_data:
  laravel_mcp_redis_data:
  laravel_api_postgresql_data:
  laravel_mcp_postgresql_data:
  laravel_api_minio_data:
  laravel_api_logs:
  kafka_data:
    # Named volume para logs compartidos entre todas las réplicas
    # Permite que LogViewer vea logs de todos los contenedores
    # Persiste logs entre reinicios de contenedores
    driver: local